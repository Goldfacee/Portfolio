<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="Resume | Tendai Chimuka">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume | Tendai Chimuka</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --navy: #0a192f;
            --slate: #112240;
            --accent: #64ffda;
            --text: #ccd6f6;
            --text-light: #8892b0;
            --border: rgba(100, 255, 218, 0.12);
            --shadow: 0 10px 30px rgba(2, 12, 27, 0.35);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(180deg, #08111f 0%, #0a192f 100%);
            color: var(--text);
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .navbar {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: rgba(10, 25, 47, 0.88);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .navbar .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            gap: 16px;
        }

        .navbar-brand {
            color: var(--accent);
            font-size: 1.3rem;
            font-weight: 700;
            text-decoration: none;
        }

        .navbar-nav {
            display: flex;
            align-items: center;
            gap: 10px;
            list-style: none;
            flex-wrap: wrap;
        }

        .navbar-nav a {
            color: var(--text);
            text-decoration: none;
            padding: 10px 16px;
            border-radius: 999px;
            font-weight: 500;
            transition: 0.25s ease;
        }

        .navbar-nav a:hover,
        .navbar-nav a.active {
            color: var(--accent);
            background: rgba(100, 255, 218, 0.08);
        }

        .resume-section {
            padding: 40px 0;
        }

        .resume-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .resume-title h1 {
            font-size: clamp(2rem, 4vw, 2.8rem);
            margin-bottom: 8px;
        }

        .resume-title p {
            color: var(--text-light);
        }

        .button {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: transparent;
            color: var(--accent);
            padding: 12px 20px;
            font-size: 1rem;
            font-weight: 500;
            border-radius: 999px;
            text-decoration: none;
            transition: 0.25s ease;
            border: 1px solid var(--accent);
        }

        .button:hover {
            background: var(--accent);
            color: var(--navy);
            transform: translateY(-2px);
        }

        .pdf-frame-wrapper {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: var(--shadow);
            height: calc(100vh - 210px);
            min-height: 700px;
        }

        .pdf-frame {
            width: 100%;
            height: 100%;
            border: none;
            background: white;
        }

        .fallback {
            display: none;
            padding: 28px;
            color: var(--text-light);
        }

        @media (max-width: 768px) {
            .pdf-frame-wrapper {
                height: calc(100vh - 240px);
                min-height: 560px;
            }
        }

        @media (max-width: 520px) {
            .navbar .container {
                flex-direction: column;
                justify-content: center;
            }

            .resume-header {
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="navbar-brand">Tendai Chimuka</a>
            <ul class="navbar-nav">
            <li><a href="../Projects/projects.html">Projects</a></li>
            <li><a href="../Homepage/index.html">Home</a></li>
            <li><a href="../Research/research.html">Research</a></li>
            <li><a href="../Resume/resume.html">Resume</a></li>
            </ul>
        </div>
    </nav>

    <section class="resume-section">
        <div class="container">
            <div class="resume-header">
                <div class="resume-title">
                    <h1>Resume</h1>
                    <p>View or download my latest resume below.</p>
                </div>

                <a href="avionics_aviation_resume.pdf" class="button" target="_blank">
                    <i class="fas fa-file-arrow-down"></i> Open / Download PDF
                </a>
            </div>

            <div class="pdf-frame-wrapper">
                <iframe
                    class="pdf-frame"
                    src="avionics_aviation_resume.pdf"
                    title="Tendai Chimuka Resume">
                </iframe>

                <div class="fallback">
                    <p>Your browser could not display the PDF inline.</p>
                    <p>
                        <a href="avionics_aviation_resume.pdf" class="button" target="_blank">
                            <i class="fas fa-file-pdf"></i> Open Resume PDF
                        </a>
                    </p>
                </div>
            </div>
        </div>
    </section>

</body>
</html>
